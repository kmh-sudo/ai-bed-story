services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile 
    container_name: bedtime-story-backend
    ports:
      - "3002:3002"
    env_file:
      - ./backend/.env
    restart: always
    command: pnpm dev 
    networks:
      - app-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bedtime-story-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://storyai.duckdns.org/api
    depends_on:
      - backend
    restart: always
    command: pnpm dev --host 0.0.0.0
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro 
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge